name: flutter_cursova
description: "Мобільний додаток для управління особистими фінансами"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.11.1 <4.0.0' 

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Управління станом (BLoC паттерн)
  flutter_bloc: ^8.1.6

  # База даних та локальне сховище
  sqflite: ^2.3.3+3
  path: ^1.9.0
  shared_preferences: ^2.5.4

  # Ін'єкція залежностей (Service Locator)
  get_it: ^8.0.2

  # Візуалізація даних та графіки
  fl_chart: ^1.2.0

  # Форматування дат та валют
  intl: 0.20.2

  # Анотації для генерації коду (Immutable моделі)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  flutter_localizations:
      sdk: flutter
  lottie: ^3.3.2
  http: ^1.6.0
  flutter_colorpicker: ^1.1.0
  carousel_slider: ^5.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  # image_path: "assets/appLogo.jpg"
  # adaptive_icon_foreground: "assets/appLogo.jpg"
  image_path: "assets/appLogo.png"
  adaptive_icon_foreground: "assets/appLogo.png"
  adaptive_icon_background: "#FFFFFF"
  remove_alpha_ios: true

  # Інструменти для генерації коду (Freezed & JSON Serializable)
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  

  assets:
    - assets/