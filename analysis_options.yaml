# Цей файл налаштовує аналізатор Dart
include: package:flutter_lints/flutter.yaml

analyzer:
  # Виключаємо згенеровані файли, щоб лінтер не сварився на код, 
  # який ми не пишемо власноруч
  exclude:
    - "**/*.freezed.dart"
    - "**/*.g.dart"
  errors:
    invalid_annotation_target: ignore

linter:
  # Тут ви можете налаштовувати конкретні правила під себе
  rules:
    # avoid_print: false
    # prefer_single_quotes: true
    use_build_context_synchronously: true